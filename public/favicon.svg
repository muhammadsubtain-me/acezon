<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <!-- Subtle shadow for the white squircle to float elegantly -->
    <filter id="tile-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- White Rounded Square Container (App Icon Tile) -->
  <rect x="2" y="2" width="44" height="44" rx="9" fill="#FFFFFF" filter="url(#tile-shadow)" />

  <!-- Symmetrical, Aligned Circular Zen Swirl (Scaled Up) -->
  <!-- Left/Upper Swirl (Grey) -->
  <path 
    d="M 24,7 A 8.5,8.5 0 0,0 24,24 A 8.5,8.5 0 0,1 24,41 A 17,17 0 0,0 24,7 Z" 
    fill="#555555" 
    stroke="#FFFFFF" 
    stroke-width="1.8" 
    stroke-linejoin="round"
  />

  <!-- Right/Lower Swirl (Black) -->
  <path 
    d="M 24,41 A 8.5,8.5 0 0,0 24,24 A 8.5,8.5 0 0,1 24,7 A 17,17 0 0,0 24,41 Z" 
    fill="#000000" 
    stroke="#FFFFFF" 
    stroke-width="1.8" 
    stroke-linejoin="round"
  />
</svg>